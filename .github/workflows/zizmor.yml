name: Workflow Security and Linting
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  zizmor:
    name: Zizmor - Security Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
        with:
          persist-credentials: false
      - name: Install zizmor
        id: install-zizmor
        uses: jaxxstorm/action-install-gh-release@1e02892ca46fae0062342f787ed9d6dae25aedae
        with:
          repo: zizmorcore/zizmor
          tag: latest
      - name: Run zizmor
        run: |
          echo "PATH: ${PATH}"
          echo "Checking for zizmor..."
          # The action installs to a cached location, check common paths
          if command -v zizmor >/dev/null 2>&1; then
            zizmor .github/workflows
          elif [ -f "/opt/hostedtoolcache/zizmorcore/zizmor/latest/linux-x64/zizmor" ]; then
            /opt/hostedtoolcache/zizmorcore/zizmor/latest/linux-x64/zizmor .github/workflows
          elif [ -f "${HOME}/.local/bin/zizmor" ]; then
            "${HOME}/.local/bin/zizmor" .github/workflows
          elif [ -f "./zizmor" ]; then
            ./zizmor .github/workflows
          else
            echo "Error: zizmor binary not found"
            echo "Checking common installation paths..."
            find /opt/hostedtoolcache -name "zizmor" 2>/dev/null || true
            exit 1
          fi

