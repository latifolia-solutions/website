name: Workflow Security and Linting
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  actionlint:
    name: Actionlint - Workflow Syntax Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
        with:
          persist-credentials: false
      - name: Run actionlint
        uses: raven-actions/actionlint@v2
        with:
          matcher: true
          cache: true
          fail-on-error: true

